<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>grandMA2 Show Analyzer</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #111827; color: #e5e7eb; }
    header { padding: 24px; background: #0f172a; position: sticky; top: 0; }
    h1, h2, h3 { margin: 0 0 12px; }
    .wrap { padding: 24px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .card { background: #1f2937; border-radius: 16px; padding: 16px; box-shadow: 0 4px 20px rgba(0,0,0,.25); }
    .muted { color: #94a3b8; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; border-bottom: 1px solid #334155; padding: 8px; vertical-align: top; }
    input, select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: #e5e7eb; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    .pill { display: inline-block; padding: 2px 8px; background: #334155; border-radius: 999px; margin: 2px; font-size: 12px; }
    .pre { white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
<header>
  <h1>grandMA2 Show Analyzer Dashboard</h1>
  <div class="muted">Offline HTML report from XML exports</div>
</header>
<div class="wrap">
  <div id="stats" class="stats"></div>

  <div class="grid">
    <div class="card">
      <h2>Sequences</h2>
      <input id="seqFilter" placeholder="Filtrovat sequence podle názvu nebo čísla">
      <div style="overflow:auto; max-height: 500px; margin-top: 12px;">
        <table>
          <thead><tr><th>No</th><th>Name</th><th>Main</th><th>Cues</th></tr></thead>
          <tbody id="seqBody"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2>Presets</h2>
      <input id="presetFilter" placeholder="Filtrovat presety">
      <div style="overflow:auto; max-height: 500px; margin-top: 12px;">
        <table>
          <thead><tr><th>No</th><th>Name</th><th>Refs</th><th>Fixtures</th></tr></thead>
          <tbody id="presetBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="grid" style="margin-top:24px;">
    <div class="card">
      <h2>Top fixture usage</h2>
      <div style="overflow:auto; max-height: 500px;">
        <table>
          <thead><tr><th>Fixture</th><th>Name / Type / Patch</th><th>Cues</th><th>Presets</th><th>Groups</th><th>Effects</th><th>Hard</th><th>PresetRefs</th><th>GroupRefs</th></tr></thead>
          <tbody id="fixtureBody"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2>Relationships</h2>
      <select id="relFilter">
        <option value="">Všechny</option>
        <option value="reference">reference</option>
        <option value="reference_unresolved">reference_unresolved</option>
        <option value="value_reference">value_reference</option>
      </select>
      <div style="overflow:auto; max-height: 500px; margin-top:12px;">
        <table>
          <thead><tr><th>Source</th><th>Target</th><th>Type</th><th>Evidence</th></tr></thead>
          <tbody id="relBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script>
const DATA = {"sequences": [{"id": "sequence:1:demo_main_sequences.xml:1", "number": "1", "name": "Intro", "source_file": "test_exports\\demo_main_sequences.xml", "cues": [{"id": "cue:1:1:demo_main_sequences.xml:1", "sequence_number": "1", "cue_number": "1", "name": "Blackout", "fade": "0", "delay": "0", "trigger": "go", "command": "Go Sequence 2 Cue 1", "part": null, "fixture_ids": [101, 102, 103], "references": ["preset:1.5", "preset:2.7", "sequence:2"], "values": [{"attribute": "fade", "raw_value": "0", "value_type": "hard", "fixture_id": null, "reference_target": null, "flags": ["timing"], "source_path": "Cue"}, {"attribute": "delay", "raw_value": "0", "value_type": "hard", "fixture_id": null, "reference_target": null, "flags": ["timing"], "source_path": "Cue"}, {"attribute": "Dimmer", "raw_value": "0", "value_type": "hard", "fixture_id": 101, "reference_target": null, "flags": [], "source_path": "Cue/Value"}, {"attribute": "Dimmer", "raw_value": "Preset 1.5", "value_type": "preset_ref", "fixture_id": 102, "reference_target": "preset:1.5", "flags": [], "source_path": "Cue/Value"}, {"attribute": "Position", "raw_value": "Preset 2.7", "value_type": "preset_ref", "fixture_id": 103, "reference_target": "preset:2.7", "flags": [], "source_path": "Cue/Value"}, {"attribute": "text", "raw_value": "Go Sequence 2 Cue 1", "value_type": "hard", "fixture_id": null, "reference_target": null, "flags": [], "source_path": "Cue/Command"}], "metadata": {"number": "1", "name": "Blackout", "fade": "0", "delay": "0", "trigger": "go", "value.fixtureid": ["101", "102", "103"], "value.attribute": ["Dimmer", "Position"], "value.value": ["0", "Preset 1.5", "Preset 2.7"], "command": "Go Sequence 2 Cue 1"}, "source_file": "test_exports\\demo_main_sequences.xml", "is_main_cue_list": true}, {"id": "cue:1:2:demo_main_sequences.xml:2", "sequence_number": "1", "cue_number": "2", "name": "Build", "fade": "2", "delay": "0.5", "trigger": "follow", "command": null, "part": null, "fixture_ids": [101, ure_type": "Martin MAC Viper", "mode": "Extended", "patch": "1.33", "universe": "1", "address": "33", "source_file": "test_exports\\demo_patch.csv", "metadata": {"fixtureid": "103", "name": "Spot 103", "label": "DS Center Spot", "fixturetype": "Martin MAC Viper", "mode": "Extended", "universe": "1", "address": "33", "patch": "1.33"}}], "generic_objects": [], "relationships": [{"source_type": "cue", "source_id": "cue:1:1:demo_main_sequences.xml:1", "target_type": "preset", "target_id": "1.5", "relation_type": "reference", "evidence": "preset:1.5"}, {"source_type": "cue", "source_id": "cue:1:1:demo_main_sequences.xml:1", "target_type": "preset", "target_id": "2.7", "relation_type": "reference", "evidence": "preset:2.7"}, {"source_type": "cue", "source_id": "cue:1:1:demo_main_sequences.xml:1", "target_type": "sequence", "target_id": "2", "relation_type": "reference_unresolved", "evidence": "sequence:2"}, {"source_type": "cue", "source_id": "cue:1:1:demo_main_sequences.xml:1", "target_type": "preset", "target_id": "1.5", "relation_type": "value_reference", "evidence": "atom:Dimmer=Preset 1.5"}, {"source_type": "cue", "source_id": "cue:1:1:demo_main_sequences.xml:1", "target_type": "preset", "target_id": "2.7", "relation_type": "value_reference", "evidence": "atom:Position=Preset 2.7"}, {"source_type": "cue", "source_id": "cue:1:2:demo_main_sequences.xml:2", "target_type": "group", "target_id": "3", "relation_type": "reference", "evidence": "group:3"}, {"source_type": "cue", "source_id": "cue:1:2:demo_main_sequences.xml:2", "target_type": "effect", "target_id": "12", "relation_type": "reference", "evidence": "effect:12"}, {"source_type": "cue", "source_id": "cue:1:2:demo_main_sequences.xml:2", "target_type": "effect", "target_id": "12", "relation_type": "value_reference", "evidence": "atom:Effect=Effect 12"}, {"source_type": "cue", "source_id": "cue:1:2:demo_main_sequences.xml:2", "target_type": "group", "target_id": "3", "relation_type": "value_reference", "evidence": " const STATS = {"sequence_count": 1, "main_sequence_count": 1, "cue_count": 2, "preset_count": 2, "group_count": 1, "effect_count": 1, "patch_fixture_count": 3, "relationship_count": 9, "unresolved_relationship_count": 1, "fixture_count": 3, "hard_value_atoms": 10, "preset_ref_atoms": 2, "effect_ref_atoms": 1, "group_ref_atoms": 1};

function el(tag, text, cls) {
  const e = document.createElement(tag);
  if (text !== undefined && text !== null) e.textContent = text;
  if (cls) e.className = cls;
  return e;
}

function renderStats() {
  const root = document.getElementById('stats');
  Object.entries(STATS).forEach(([k, v]) => {
    const card = el('div', undefined, 'card');
    card.appendChild(el('div', k, 'muted'));
    card.appendChild(el('div', String(v)));
    root.appendChild(card);
  });
}

function renderSequences() {
  const filter = document.getElementById('seqFilter').value.toLowerCase();
  const body = document.getElementById('seqBody');
  body.innerHTML = '';
  DATA.sequences
    .filter(s => `${s.number} ${s.name}`.toLowerCase().includes(filter))
    .forEach(s => {
      const tr = document.createElement('tr');
      tr.appendChild(el('td', s.number || ''));
      tr.appendChild(el('td', s.name || ''));
      tr.appendChild(el('td', s.is_main_cue_list ? 'yes' : ''));
      tr.appendChild(el('td', String((s.cues || []).length)));
      body.appendChild(tr);
    });
}

function renderPresets() {
  const filter = document.getElementById('presetFilter').value.toLowerCase();
  const body = document.getElementById('presetBody');
  body.innerHTML = '';
  DATA.presets
    .filter(p => `${p.number} ${p.name}`.toLowerCase().includes(filter))
    .slice(0, 1500)
    .forEach(p => {
      const tr = document.createElement('tr');
      tr.appendChild(el('td', p.number || ''));
      tr.appendChild(el('td', p.name || ''));
      tr.appendChild(el('td', (p.references || []).join(' | ')));
      tr.appendChild(el('td', (p.fixture_ids || []).join(' ')));
      body.appendChild(tr);
    });
}

function renderFixtures() {
  const body = document.getElementById('fixtureBody');
  body.innerHTML = '';
  Object.values(DATA.fixture_usage)
    .sort((a, b) => (b.cue_count + b.preset_count + b.group_count) - (a.cue_count + a.preset_count + a.group_count))
    .slice(0, 500)
    .forEach(f => {
      const tr = document.createElement('tr');
      tr.appendChild(el('td', String(f.fixture_id)));
      tr.appendChild(el('td', [f.fixture_name || '', f.fixture_type || '', f.fixture_patch || ''].filter(Boolean).join(' | ')));
      tr.appendChild(el('td', String(f.cue_count || 0)));
      tr.appendChild(el('td', String(f.preset_count || 0)));
      tr.appendChild(el('td', String(f.group_count || 0)));
      tr.appendChild(el('td', String(f.effect_count || 0)));
      tr.appendChild(el('td', String(f.hard_value_atoms || 0)));
      tr.appendChild(el('td', String(f.preset_ref_atoms || 0)));
      tr.appendChild(el('td', String(f.group_ref_atoms || 0)));
      body.appendChild(tr);
    });
}

function renderRelationships() {
  const wanted = document.getElementById('relFilter').value;
  const body = document.getElementById('relBody');
  body.innerHTML = '';
  DATA.relationships
    .filter(r => !wanted || r.relation_type === wanted)
    .slice(0, 1500)
    .forEach(r => {
      const tr = document.createElement('tr');
      tr.appendChild(el('td', `${r.source_type}:${r.source_id}`));
      tr.appendChild(el('td', `${r.target_type}:${r.target_id}`));
      tr.appendChild(el('td', r.relation_type));
      tr.appendChild(el('td', r.evidence));
      body.appendChild(tr);
    });
}

document.getElementById('seqFilter').addEventListener('input', renderSequences);
document.getElementById('presetFilter').addEventListener('input', renderPresets);
document.getElementById('relFilter').addEventListener('change', renderRelationships);

renderStats();
renderSequences();
renderPresets();
renderFixtures();
renderRelationships();
</script>
</body>
</html>
